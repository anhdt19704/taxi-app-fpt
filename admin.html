<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Trị Hệ Thống Taxi</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 30px auto; padding: 20px; }
        h1, h2 { color: #333; }
        .card-container { display: flex; gap: 20px; margin-bottom: 25px; }
        .card { flex: 1; padding: 20px; border-radius: 8px; color: white; font-size: 18px; font-weight: bold; }
        .bg-success { background-color: #28a745; }
        .bg-primary { background-color: #007bff; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f4f6f9; font-weight: bold; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .btn-update { padding: 10px 20px; background: #ffc107; color: #212529; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .btn-update:hover { background: #e0a800; }
        input { padding: 8px; width: 150px; margin-right: 10px; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

    <h1>⚙️ TRANG QUẢN TRỊ TAXI (ADMIN)</h1>
    <hr>

    <h2>💰 Cấu Hình Giá Tiền Trên Mỗi Km</h2>
    <div style="background: #f4f6f9; padding: 20px; border-radius: 8px; margin-bottom: 30px;">
        <label><strong>Xe 4 chỗ (đ/km):</strong></label>
        <input type="number" id="price4Input" value="11000">
        
        <label style="margin-left: 15px;"><strong>Xe 7 chỗ (đ/km):</strong></label>
        <input type="number" id="price7Input" value="13000">
        
        <button class="btn-update" onclick="updatePrices()">Cập Nhật Thay Đổi</button>
    </div>

    <h2>📊 Báo Cáo Doanh Thu Hệ Thống</h2>
    <div class="card-container">
        <div class="card bg-success">
            Tổng số chuyến đã đặt: <br>
            <span id="totalBookings" style="font-size: 28px;">0</span> chuyến
        </div>
        <div class="card bg-primary">
            Tổng tiền doanh thu tạm tính: <br>
            <span id="totalRevenue" style="font-size: 28px;">0</span> VNĐ
        </div>
    </div>

    <h2>📜 Chi Tiết Danh Sách Đơn Đặt Xe</h2>
    <table>
        <thead>
            <tr>
                <th>Thời gian</th>
                <th>Tên Khách Hàng</th>
                <th>Số Điện Thoại</th>
                <th>Tuyến Đường</th>
                <th>Loại Xe</th>
                <th>Tổng Tiền</th>
            </tr>
        </thead>
        <tbody id="historyTableBody">
            <tr>
                <td colspan="6" style="text-align: center; color: #888;">Đang tải dữ liệu từ máy chủ...</td>
            </tr>
        </tbody>
    </table>

    <script>
        // 1. Tải giá cũ hiện tại lên các ô nhập liệu
        async function loadCurrentPrices() {
            try {
                const res = await fetch('/api/prices');
                const data = await res.json();
                document.getElementById('price4Input').value = data.price4;
                document.getElementById('price7Input').value = data.price7;
            } catch (err) { console.error(err); }
        }

        // 2. Hàm gửi giá mới thay đổi lên máy chủ
        async function updatePrices() {
            const price4 = document.getElementById('price4Input').value;
            const price7 = document.getElementById('price7Input').value;

            try {
                const res = await fetch('/api/update-price', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ price4, price7 })
                });
                const data = await res.json();
                alert(data.message);
            } catch (err) { alert("Lỗi cập nhật cấu hình."); }
        }

        // 3. Tải toàn bộ dữ liệu lịch sử và tổng tiền doanh thu
        async function loadStatisticsAndHistory() {
            try {
                const res = await fetch('/api/admin/statistics');
                const data = await res.json();

                if (data.success) {
                    // Hiển thị hai thẻ thống kê tổng
                    document.getElementById('totalBookings').innerText = data.totalBookings;
                    document.getElementById('totalRevenue').innerText = data.totalRevenue.toLocaleString('vi-VN');

                    // Đổ dữ liệu lịch sử đơn hàng vào bảng bảng biểu
                    const tbody = document.getElementById('historyTableBody');
                    if (data.history.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; color:#999;">Hệ thống chưa ghi nhận đơn đặt xe nào.</td></tr>`;
                        return;
                    }

                    tbody.innerHTML = data.history.map(item => `
                        <tr>
                            <td>${item.date}</td>
                            <td><strong>${item.customerName}</strong></td>
                            <td><a href="tel:${item.phone}">${item.phone}</a></td>
                            <td>${item.route}</td>
                            <td>${item.carType}</td>
                            <td style="color: #28a745; font-weight: bold;">${item.price.toLocaleString('vi-VN')} đ</td>
                        </tr>
                    `).join('');
                }
            } catch (err) {
                console.error("Lỗi lấy lịch sử thống kê:", err);
            }
        }

        // Khởi động đồng bộ dữ liệu ngay khi mở trang web quản lý
        window.addEventListener('DOMContentLoaded', () => {
            loadCurrentPrices();
            loadStatisticsAndHistory();
        });
    </script>
</body>
</html>
