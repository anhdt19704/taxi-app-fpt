<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt Xe Taxi Nội Bài Giá Rẻ</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 30px auto; padding: 20px; border: 1px solid #ccc; border-radius: 10px; background-color: #fafafa; }
        h1 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; font-size: 16px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #218838; }
        .result { margin-top: 20px; padding: 15px; background: #e9ecef; border-left: 5px solid #007bff; display: none; border-radius: 3px; }
    </style>
</head>
<body>

    <h1>🚕 ĐẶT XE TAXI NỘI BÀI</h1>
    
    <div class="form-group">
        <label>Tên khách hàng:</label>
        <input type="text" id="customerName" placeholder="Nhập tên của bạn">
    </div>

    <div class="form-group">
        <label>Số điện thoại:</label>
        <input type="text" id="phone" placeholder="Nhập số điện thoại nhận cuộc gọi">
    </div>

    <div class="form-group">
        <label>Tuyến đường đi:</label>
        <select id="route">
            <option value="Hà Nội -> Nội Bài" data-km="30">Hà Nội nội thành ➔ Sân bay Nội Bài (~30km)</option>
            <option value="Nội Bài -> Hà Nội" data-km="30">Sân bay Nội Bài ➔ Hà Nội nội thành (~30km)</option>
        </select>
    </div>

    <div class="form-group">
        <label>Loại xe cần đặt:</label>
        <select id="carType">
            <option value="4">Xe 4 chỗ nhỏ gọn</option>
            <option value="7">Xe 7 chỗ rộng rãi</option>
        </select>
    </div>

    <button onclick="bookingTaxi()">Đặt Xe Ngay 🚕</button>

    <div id="resultBox" class="result"></div>

    <script>
        let currentPrices = { price4: 11000, price7: 13000 };

        // Tự động tải giá xe mới nhất từ server
        async function fetchPrices() {
            try {
                const res = await fetch('/api/prices');
                currentPrices = await res.json();
            } catch (err) {
                console.error("Không thể lấy giá xe:", err);
            }
        }

        async function bookingTaxi() {
            const customerName = document.getElementById('customerName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const routeSelect = document.getElementById('route');
            const route = routeSelect.value;
            const km = parseFloat(routeSelect.options[routeSelect.selectedIndex].getAttribute('data-km'));
            const carType = document.getElementById('carType').value;

            if(!customerName || !phone) {
                alert("Bạn vui lòng điền đầy đủ Tên và Số điện thoại nhé!");
                return;
            }

            // Tính tiền dựa vào cấu hình giá động từ Admin
            const pricePerKm = carType === '4' ? currentPrices.price4 : currentPrices.price7;
            const finalPrice = km * pricePerKm;

            // Gửi dữ liệu đơn đặt lên server để lưu lịch sử & thống kê doanh thu
            try {
                const response = await fetch('/api/bookings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ customerName, phone, route, carType, price: finalPrice })
                });
                
                const data = await response.json();
                
                if(data.success) {
                    const resultBox = document.getElementById('resultBox');
                    resultBox.style.display = 'block';
                    resultBox.innerHTML = `
                        <h3 style="color: #28a745; margin-top:0;">🎉 ${data.message}</h3>
                        <p><strong>Khách hàng:</strong> ${customerName}</p>
                        <p><strong>Lộ trình:</strong> ${route}</p>
                        <p><strong>Loại xe:</strong> ${carType === '4' ? '4 chỗ' : '7 chỗ'}</p>
                        <p><strong>Tổng tiền dự kiến:</strong> <span style="color:red; font-size:18px; font-weight:bold;">${finalPrice.toLocaleString('vi-VN')} VNĐ</span></p>
                    `;
                } else {
                    alert("Đặt xe thất bại: " + data.message);
                }
            } catch (err) {
                alert("Lỗi kết nối mạng, vui lòng thử lại!");
            }
        }

        // Chạy tải giá khi mở trang web lên
        fetchPrices();
    </script>
</body>
</html>
